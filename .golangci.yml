version: "2"

run:
  concurrency: 20
  timeout: 10m
  issues-exit-code: 1
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    revive:
      rules:
        - name: package-comments
          severity: warning
          disabled: true
          exclude: [""]
