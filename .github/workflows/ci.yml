name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go.work.sum

      - name: Sanitize Workspace

        run: |
          if [ -f go.work ]; then
            sed -i '/\.\.\//d' go.work
            echo "Workspace sanitizado:"
            cat go.work
          fi

      - name: Test
        run: make test

      - name: Coverage
        run: make coverage

      - name: Generate badges
        run: make badges

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Commit badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .public/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update coverage badges [skip ci]"
          git push

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Sanitize Workspace
        run: sed -i '/\.\.\//d' go.work

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          [
            core,
            validator,
            controller,
            pipes,
            guards,
            interceptors,
            exceptions,
            swagger,
            adapters,
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Sanitize Workspace
        run: sed -i '/\.\.\//d' go.work

      - name: Build ${{ matrix.module }}
        run: cd ${{ matrix.module }} && go build -v ./...
