name: ci

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  GOPRIVATE: "github.com/gonest-dev/*"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-modules.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - id: set-modules
        run: |
          MODULES=$(grep '^\s*\./' go.work | sed 's|^\s*\./||; s/[[:space:]]*$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

  test-and-coverage:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Test & Coverage
        run: make ci

      - name: Commit badges
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .public/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update badges [skip ci]"
          git push

  lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run Parallel Lint
        uses: ./.github/actions/golangci-lint
        with:
          module: ./${{ matrix.module }}/...

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.setup.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build ${{ matrix.module }}
        run: |
          if [ -d "${{ matrix.module }}" ]; then
            cd "${{ matrix.module }}" && go build -v ./...
          else
            TARGET_DIR=$(find . -name "${{ matrix.module }}" -type d -not -path '*/.*' | head -n 1)
            cd "$TARGET_DIR" && go build -v ./...
          fi