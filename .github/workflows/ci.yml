name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Test
        run: make test

      - name: Coverage
        run: make coverage

      - name: Generate badges
        run: make badges

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Commit badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .public/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update coverage badges [skip ci]"
          git push

  lint:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          # Especificar os diretórios resolve o erro "prefix . does not contain modules" visto na imagem
          args: --timeout=5m ./core/... ./validator/... ./controller/... ./pipes/... ./guards/... ./interceptors/... ./exceptions/... ./swagger/... ./adapters/...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          [
            core,
            validator,
            controller,
            pipes,
            guards,
            interceptors,
            exceptions,
            swagger,
            adapters,
          ]
    env:
      GOWORK: off
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build ${{ matrix.module }}
        run: |
          if [ -d "${{ matrix.module }}" ]; then
            cd ${{ matrix.module }} && go build -v ./...
          elif [ -d "gonest/${{ matrix.module }}" ]; then
            cd gonest/${{ matrix.module }} && go build -v ./...
          else
            echo "Erro: Pasta do módulo '${{ matrix.module }}' não encontrada no repositório."
            ls -R
            exit 1
          fi
